<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图表诊断 - 使用真实模拟数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0e1a; color: #f1f5f9; font-family: -apple-system, sans-serif; padding: 20px; }
        h2 { margin-bottom: 20px; color: #94a3b8; border-bottom: 1px solid #2a3654; padding-bottom: 10px; }
        .section { margin-bottom: 32px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .chart-box { background: #1a2236; border: 1px solid #2a3654; border-radius: 12px; padding: 16px; min-height: 280px; }
        .chart-title { font-size: 13px; color: #94a3b8; margin-bottom: 12px; font-weight: 600; }
        canvas { width: 100% !important; height: 220px !important; }
        .info { background: #111827; border: 1px solid #2a3654; border-radius: 8px; padding: 16px; margin-bottom: 24px; font-family: monospace; font-size: 12px; color: #10b981; white-space: pre-wrap; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        .tag-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .tag-ok { background: rgba(16,185,129,0.15); color: #10b981; }
        .full { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <h2>图表诊断报告 <span class="tag tag-warn">baseOptions + category</span></h2>

    <div id="chart-info" class="info">加载中...</div>

    <div class="section">
        <h3 style="color:#64748b;margin-bottom:12px;">实际应用场景：资金曲线（20个数据点）</h3>
        <div class="chart-grid">
            <div class="chart-box">
                <div class="chart-title">资金曲线 - 当前配置 (type:category)</div>
                <canvas id="c1"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">柱状图 - 单笔收益率</div>
                <canvas id="c2"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">盈亏饼图</div>
                <canvas id="c3"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">月度收益</div>
                <canvas id="c4"></canvas>
            </div>
            <div class="chart-box full">
                <div class="chart-title">收益散点分布</div>
                <canvas id="c5"></canvas>
            </div>
        </div>
    </div>

    <div class="section">
        <h3 style="color:#64748b;margin-bottom:12px;">边界测试</h3>
        <div class="chart-grid">
            <div class="chart-box">
                <div class="chart-title">空数据 []</div>
                <canvas id="e1"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">单点 [{date:'2026-03-01', equity:100000}]</div>
                <canvas id="e2"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">极端数值 (NaN/Infinity)</div>
                <canvas id="e3"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">日期超出范围 (2020-01-01 ~ 2099-12-31)</div>
                <canvas id="e4"></canvas>
            </div>
        </div>
    </div>

<script>
// ============ 模拟数据 ============
const mockCurve = [
    {"date":"2026-03-01","equity":100000},{"date":"2026-03-04","equity":100400},
    {"date":"2026-03-07","equity":100800},{"date":"2026-03-10","equity":101500},
    {"date":"2026-03-13","equity":101900},{"date":"2026-03-16","equity":102300},
    {"date":"2026-03-19","equity":103000},{"date":"2026-03-22","equity":103400},
    {"date":"2026-03-25","equity":103800},{"date":"2026-03-28","equity":104500},
    {"date":"2026-03-31","equity":104900},{"date":"2026-04-03","equity":105300},
    {"date":"2026-04-06","equity":106000},{"date":"2026-04-09","equity":106400},
    {"date":"2026-04-12","equity":106800},{"date":"2026-04-15","equity":107500},
    {"date":"2026-04-18","equity":107900},{"date":"2026-04-21","equity":108300},
    {"date":"2026-04-24","equity":109000},{"date":"2026-04-27","equity":109400}
];
const mockTrades = [
    {"date":"2026-03-05","stock_code":"000001","stock_name":"TestStock","action":"buy","price":12.5,"shares":100,"amount":1250,"pnl_pct":0,"pnl":0,"holding_days":0,"reason":"MA5上穿MA20"},
    {"date":"2026-03-10","stock_code":"000001","stock_name":"TestStock","action":"sell","price":13.0,"shares":100,"amount":1300,"pnl_pct":4.0,"pnl":50,"holding_days":5,"reason":"止盈"},
    {"date":"2026-03-15","stock_code":"000001","stock_name":"TestStock","action":"buy","price":12.8,"shares":100,"amount":1280,"pnl_pct":0,"pnl":0,"holding_days":0,"reason":"MA5上穿MA20"},
    {"date":"2026-03-22","stock_code":"000001","stock_name":"TestStock","action":"sell","price":12.2,"shares":100,"amount":1220,"pnl_pct":-4.7,"pnl":-60,"holding_days":7,"reason":"止损"}
];
const mockMonthly = {"2026-03":2.5,"2026-04":-1.2};
const mockMetrics = {total_trades:2,win_trades:1,lose_trades:1,success_rate:50.0,total_return_pct:9.4,avg_return_pct:4.7,max_drawdown:4.7,sharpe_ratio:1.2,annual_return:25.0};

// ============ 配置 ============
const COLORS = {
    accent:'#6366f1', accentLight:'rgba(99,102,241,0.2)',
    success:'#10b981', successLight:'rgba(16,185,129,0.2)',
    danger:'#ef4444', dangerLight:'rgba(239,68,68,0.2)',
    warning:'#f59e0b', text:'#94a3b8', grid:'rgba(42,54,84,0.8)', bg:'#1a2236'
};

function baseOpts() {
    return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 0 },
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: COLORS.bg,
                borderColor: COLORS.grid, borderWidth: 1,
                titleColor: '#f1f5f9', bodyColor: '#94a3b8',
                padding: 12, cornerRadius: 8,
            }
        },
        scales: {
            x: {
                type: 'category',
                grid: { color: COLORS.grid, drawBorder: false },
                ticks: { color: COLORS.text, font: {size:11}, maxRotation:0, autoSkip:true, maxTicksLimit:12 }
            },
            y: {
                grid: { color: COLORS.grid, drawBorder: false },
                ticks: { color: COLORS.text, font: {size:11} }
            }
        }
    };
}

// ============ 诊断信息 ============
const info = [
    'Chart.js version: ' + Chart.version,
    'Adapter loaded: ' + (typeof Chart._adapters !== 'undefined' ? 'YES' : 'NO'),
    'Adapter type: ' + (Chart._adapters?._date ? 'date-fns (via bundle)' : 'unknown'),
    '',
    '数据点数: ' + mockCurve.length,
    '数据范围: ' + mockCurve[0].date + ' ~ ' + mockCurve[mockCurve.length-1].date,
    'equity范围: ' + mockCurve[0].equity.toLocaleString() + ' ~ ' + mockCurve[mockCurve.length-1].equity.toLocaleString(),
    '',
    '--- 问题排查 ---',
    '如果图表坐标轴延伸到 +-Infinity，说明:',
    '1. date-fns adapter 覆盖了 type:category 设置',
    '2. 或者 x轴 被当作 time/linear 处理',
    '',
    '--- 解决方案 ---',
    '方案A: 移除 chartjs-adapter-date-fns',
    '方案B: 所有日期标签改为非日期格式 (D1,D2...)',
    '方案C: 使用 time scale + min/max 范围限制'
].join('\n');
document.getElementById('chart-info').textContent = info;

// ============ 图表1: 资金曲线 ============
new Chart(document.getElementById('c1'), {
    type: 'line',
    data: {
        labels: mockCurve.map(e => e.date),
        datasets: [{
            label: '资金曲线',
            data: mockCurve.map(e => e.equity),
            borderColor: COLORS.accent,
            backgroundColor: COLORS.accentLight,
            borderWidth: 2, fill: true, tension: 0.3,
            pointRadius: mockCurve.length > 30 ? 0 : 3,
            pointBackgroundColor: COLORS.accent,
        }]
    },
    options: {
        ...baseOpts(),
        interaction: { intersect: false, mode: 'index' },
        plugins: {
            ...baseOpts().plugins,
            tooltip: { ...baseOpts().plugins.tooltip, callbacks: { label: ctx => `资金: ¥${ctx.parsed.y.toLocaleString()}` } }
        }
    }
});

// ============ 图表2: 收益率柱状图 ============
const sellTrades = mockTrades.filter(t => t.action === 'sell');
new Chart(document.getElementById('c2'), {
    type: 'bar',
    data: {
        labels: sellTrades.map(t => t.date),
        datasets: [{
            label: '收益率',
            data: sellTrades.map(t => t.pnl_pct),
            backgroundColor: sellTrades.map(t => t.pnl_pct >= 0 ? COLORS.success + 'cc' : COLORS.danger + 'cc'),
            borderColor: sellTrades.map(t => t.pnl_pct >= 0 ? COLORS.success : COLORS.danger),
            borderWidth: 1, borderRadius: 4,
        }]
    },
    options: {
        ...baseOpts(),
        plugins: {
            ...baseOpts().plugins,
            tooltip: { ...baseOpts().plugins.tooltip, callbacks: { label: ctx => `${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%` } }
        },
        scales: {
            ...baseOpts().scales,
            x: { ...baseOpts().scales.x, ticks: { display: false } }
        }
    }
});

// ============ 图表3: 盈亏饼图 ============
new Chart(document.getElementById('c3'), {
    type: 'doughnut',
    data: {
        labels: ['盈利', '亏损'],
        datasets: [{
            data: [mockMetrics.win_trades, mockMetrics.lose_trades],
            backgroundColor: [COLORS.success + 'cc', COLORS.danger + 'cc'],
            borderColor: [COLORS.success, COLORS.danger],
            borderWidth: 2, hoverOffset: 8,
        }]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '65%',
        plugins: {
            legend: { position: 'bottom', labels: { color: COLORS.text, padding: 16, font: {size:13} } },
            tooltip: { ...baseOpts().plugins.tooltip, callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed} 笔` } }
        }
    }
});

// ============ 图表4: 月度收益 ============
const months = Object.keys(mockMonthly).sort();
const monthVals = months.map(m => mockMonthly[m]);
new Chart(document.getElementById('c4'), {
    type: 'bar',
    data: {
        labels: months,
        datasets: [{
            label: '月度收益',
            data: monthVals,
            backgroundColor: monthVals.map(v => v >= 0 ? COLORS.success + 'cc' : COLORS.danger + 'cc'),
            borderColor: monthVals.map(v => v >= 0 ? COLORS.success : COLORS.danger),
            borderWidth: 1, borderRadius: 4,
        }]
    },
    options: {
        ...baseOpts(),
        plugins: {
            ...baseOpts().plugins,
            tooltip: { ...baseOpts().plugins.tooltip, callbacks: { label: ctx => `${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%` } }
        },
        scales: {
            ...baseOpts().scales,
            y: { ...baseOpts().scales.y, ticks: { ...baseOpts().scales.y.ticks, callback: v => v + '%' } }
        }
    }
});

// ============ 图表5: 散点图 ============
const scatterPoints = sellTrades.map((t, i) => ({x: i+1, y: t.pnl_pct, date: t.date, name: t.stock_name}));
new Chart(document.getElementById('c5'), {
    type: 'scatter',
    data: {
        datasets: [{
            label: '单笔收益',
            data: scatterPoints,
            backgroundColor: scatterPoints.map(p => p.y >= 0 ? COLORS.success + '99' : COLORS.danger + '99'),
            pointBorderColor: scatterPoints.map(p => p.y >= 0 ? COLORS.success : COLORS.danger),
            pointRadius: 6, pointHoverRadius: 9,
        }]
    },
    options: {
        ...baseOpts(),
        scales: {
            x: {
                type: 'linear', min: 1,
                grid: { color: COLORS.grid, drawBorder: false },
                title: { display:true, text:'交易序号', color: COLORS.text, font:{size:11} },
                ticks: { color: COLORS.text, font:{size:11}, stepSize:1, callback: v => Number.isInteger(v) ? v : '' }
            },
            y: {
                ...baseOpts().scales.y,
                title: { display:true, text:'收益率 (%)', color: COLORS.text, font:{size:11} },
                ticks: { callback: v => v + '%' }
            }
        },
        plugins: {
            ...baseOpts().plugins,
            tooltip: {
                ...baseOpts().plugins.tooltip,
                callbacks: {
                    title: ctx => `${ctx[0].raw.date}`,
                    label: ctx => `${ctx.raw.name}: ${ctx.raw.y >= 0 ? '+' : ''}${ctx.raw.y.toFixed(2)}%`
                }
            }
        }
    }
});

// ============ 边界测试 ============
// 空数据
new Chart(document.getElementById('e1'), {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: COLORS.accent, borderWidth: 2 }] },
    options: baseOpts()
});

// 单点
new Chart(document.getElementById('e2'), {
    type: 'line',
    data: { labels: ['2026-03-01'], datasets: [{ data: [100000], borderColor: COLORS.success, borderWidth: 2 }] },
    options: baseOpts()
});

// 极端数值
new Chart(document.getElementById('e3'), {
    type: 'line',
    data: {
        labels: ['2026-03-01','2026-03-02','2026-03-03','2026-03-04','2026-03-05'],
        datasets: [{ data: [100000, NaN, 101000, Infinity, -Infinity], borderColor: COLORS.warning, borderWidth: 2, spanGaps: true }]
    },
    options: baseOpts()
});

// 日期超出范围
new Chart(document.getElementById('e4'), {
    type: 'line',
    data: {
        labels: ['2020-01-01','2020-06-01','2021-01-01','2099-01-01','2099-06-01'],
        datasets: [{ data: [100000,101000,102000,103000,104000], borderColor: COLORS.danger, borderWidth: 2 }]
    },
    options: baseOpts()
});
</script>
</body>
</html>
